# Cloudflare Worker name must match dashboard service: encfile
# Deploy with: npx wrangler deploy  (NOT pages deploy)
name = "encfile"
main = "src/index.js"
compatibility_date = "2026-07-21"

[assets]
directory = "."
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[vars]
TURNSTILE_SITE_KEY = "0x4AAAAAAD8Aw7aogO2sjTxW"
TURNSTILE_HOSTNAME = "encfile.antiumbo123.workers.dev"
REGISTRATION_REVIEW_REQUIRED = "true"

[[d1_databases]]
binding = "DB"
database_name = "model-market-db"
database_id = "0451e9a7-7c98-4394-8bff-1b29fec1cbd9"
migrations_dir = "migrations"
